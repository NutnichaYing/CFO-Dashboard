name: Update FX Data

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 08:00 BKK (เช้า)
    - cron: '0 7 * * 1-5'  # 14:00 BKK (กลางวัน)
    - cron: '0 13 * * 1-5'  # 20:00 BKK (เย็น)
  workflow_dispatch:
jobs:
  update-fx-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Fetch FX data and news
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "FX Bot"
          git add data/fx_data.json
          git diff --staged --quiet || git commit -m "FX update $(date +'%Y-%m-%d %H:%M') BKK"
          git push
