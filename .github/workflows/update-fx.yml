name: Update FX Data

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 07:00 BKK
    - cron: '0 3 * * 1-5'   # 10:00 BKK (Synnex Brief)
    - cron: '0 4 * * 1-5'   # 11:00 BKK
    - cron: '0 11 * * 1-5'  # 18:00 BKK
  workflow_dispatch:

jobs:
  update-fx-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Fetch FX data, FX news, and Synnex news
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "FX Bot"
          git add data/fx_data.json
          git diff --staged --quiet || git commit -m "Data update $(date +'%Y-%m-%d %H:%M') BKK"
          git push
